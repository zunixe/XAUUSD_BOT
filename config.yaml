# XAUUSD Bot Configuration
# All tunable parameters in one place

model:
  n_classes: 3
  forward_days: 3
  forward_bars_4h: 8
  n_splits_daily: 4
  n_splits_4h: 3
  optuna_trials_daily: 30
  optuna_trials_4h: 20
  min_threshold: 0.55
  retrain_min_evaluations: 30
  retrain_interval_days: 30

labeling:
  atr_mult_tp: 0.8
  atr_mult_sl: 1.2

risk:
  risk_per_trade: 0.01
  max_risk_pct: 0.02
  max_drawdown_pct: 0.15
  weekly_loss_limit_pct: 0.05
  cooldown_after_losses: 3
  max_concurrent_positions: 2

evaluation:
  max_lookahead_daily: 10
  max_lookahead_4h: 14
  spread: 0.30

daemon:
  interval_hours: 4
  telegram_poll_seconds: 5
  heartbeat_hours: 6

volatility_regime:
  low_mult: 1.3
  normal_mult: 1.0
  high_mult: 0.7
  extreme_mult: 0.5

trailing_stop:
  breakeven_atr: 0.5
  trail_atr: 1.0
  trail_distance_atr: 0.5

partial_tp:
  tp1_pct: 0.7
  tp2_pct: 0.3

data:
  macro_tickers:
    "^VIX": ["VIX_Close", "vix_daily.csv"]
    "^GSPC": ["SPY_Close", "spy_daily.csv"]
    "^TNX": ["US10Y_Close", "us10y_daily.csv"]
    "CL=F": ["OIL_Close", "oil_daily.csv"]
    "DX-Y.NYB": ["DXY_Close", "dxy_daily.csv"]
    "TIP": ["TIP_Close", "tip_daily.csv"]
    "SI=F": ["Silver_Close", "silver_daily.csv"]
    "BTC-USD": ["BTC_Close", "btc_daily.csv"]
    "JPY=X": ["USDJPY_Close", "usdjpy_daily.csv"]
    "EURUSD=X": ["EURUSD_Close", "eurusd_daily.csv"]
    "HG=F": ["Copper_Close", "copper_daily.csv"]
